/* ── RECEIPT PRINTER ── */
function printReceipt(ord, paperSize) {
  var is58 = paperSize === '58';
  var W = is58 ? 26 : 36;
  var mmSize = is58 ? '58mm' : '80mm';
  var mmWidth = is58 ? '50mm' : '72mm';
  var fontSize = is58 ? '15px' : '17px';
  var lineH = is58 ? '1.7' : '1.8';
  var padTop = is58 ? '3mm' : '4mm';
  // Inject correct print CSS dynamically
  var styleEl = document.getElementById('receipt-print-style');
  if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = 'receipt-print-style'; document.head.appendChild(styleEl); }
  /* font-weight:bold on receipt-frame makes ALL text bold by default for clearer thermal printing */
  styleEl.textContent = '@media print{' +
    '@page{size:' + mmSize + ' auto;margin:0;}' +
    'html,body{height:auto!important;overflow:visible!important;position:static!important;width:auto!important;}' +
    'body>*{display:none!important;}' +
    '#receipt-frame{display:block!important;font-family:"Courier New",Courier,monospace;font-size:' + fontSize + ';line-height:' + lineH + ';font-weight:bold;color:#000;background:#fff;width:' + mmWidth + ';padding:' + padTop + ' 2mm 8mm;margin:0;height:auto!important;max-height:none!important;overflow:visible!important;position:static!important;word-break:break-word;overflow-wrap:break-word;-webkit-print-color-adjust:exact;}' +
    '#receipt-frame div{white-space:pre-wrap;page-break-inside:auto;break-inside:auto;}' +
    '#receipt-frame .rflex{white-space:normal;word-break:break-word;overflow-wrap:break-word;display:flex;}' +
    '#receipt-frame .rhr{border:none;border-top:1px dashed #000;margin:3px 0;display:block;width:100%;}' +
    '}';
  var HR = '<hr class="rhr"/>';
  function line(left, right) {
    var gap = W - left.length - right.length;
    return left + (gap > 0 ? ' '.repeat(gap) : ' ') + right;
  }
  var html = [];
  function row(txt) { html.push('<div>' + txt.replace(/ /g, '&nbsp;') + '</div>'); }
  function div() { html.push(HR); }
  function blank() { html.push('<div>&nbsp;</div>'); }

  function crow(txt) { html.push('<div style="text-align:center;">' + txt + '</div>'); }
  function crowb(txt) { html.push('<div style="text-align:center;font-weight:bold;">' + txt + '</div>'); }
  function rowb(txt) { html.push('<div style="font-weight:bold;">' + txt.replace(/ /g, '&nbsp;') + '</div>'); }

  crow("HONG'S THAI TAKEAWAY");
  crow('01386 423341');
  crow('9 Four Pools Shopping Centre');
  crow('Davies Road, Evesham');
  crow('WR11 1YP');
  div();
  crow(ord.orderType === 'delivery' ? '*** DELIVERY ***' : '*** COLLECTION ***');
  div();
  if (ord.scheduleType === 'scheduled' && ord.scheduleTime) {
    crowb('*** SCHEDULED ***');
    crowb(ord.scheduleTime.toUpperCase());
    div();
  } else {
    crowb('*** ASAP ***');
    div();
  }
  /* Big D / C letter on right, info on left — helps chef identify order type instantly */
  var bigLetter = ord.orderType === 'delivery' ? 'D' : 'C';
  var bigLetterFontSize = is58 ? '42px' : '54px';
  var bigLetterColW = is58 ? '32px' : '42px';

  /* Build info lines — each line uses overflow-wrap so full words move to next line */
  function infoRow(txt) {
    return '<div style="overflow-wrap:break-word;word-break:normal;">' + txt + '</div>';
  }
  function infoBlank() { return '<div>&nbsp;</div>'; }

  var infoHtml = '';
  infoHtml += infoRow('Date : ' + ord.date);
  infoHtml += infoRow('Time : ' + ord.time);
  infoHtml += infoRow('Name : ' + (ord.customer.name || ''));
  infoHtml += infoBlank(); infoHtml += infoBlank();
  infoHtml += infoRow('Tel  : ' + (ord.customer.phone || ''));
  infoHtml += infoBlank(); infoHtml += infoBlank();

  if (ord.orderType === 'delivery') {
    var addrParts = ord.customer.address
      ? ord.customer.address.split(/[\n,]+/).map(function(s){ return s.trim(); }).filter(Boolean)
      : [];
    if (addrParts.length > 0) {
      addrParts.forEach(function(part, i) {
        infoHtml += infoRow((i === 0 ? 'Addr : ' : '       ') + part);
      });
    } else {
      infoHtml += infoRow('Addr : ');
    }
    infoHtml += infoBlank(); infoHtml += infoBlank();
  }

  html.push(
    '<div class="rflex" style="display:flex;justify-content:space-between;align-items:center;">' +
    '<div style="flex:1;min-width:0;">' + infoHtml + '</div>' +
    '<div style="flex-shrink:0;width:' + bigLetterColW + ';text-align:right;font-size:' + bigLetterFontSize + ';font-weight:900;line-height:1;">' + bigLetter + '</div>' +
    '</div>'
  );
  div();
  if (ord.customer.notes) {
    div();
    row('NOTE:');
    var words = ord.customer.notes.split(' ');
    var cur = '';
    words.forEach(function(w) {
      if ((cur + ' ' + w).trim().length <= W) { cur = (cur + ' ' + w).trim(); }
      else { rowb(cur); cur = w; }
    });
    if (cur) rowb(cur);
  }
  if (ord.paymentType) {
    div();
    html.push('<div class="rflex" style="display:flex;justify-content:space-between;"><span>Payment</span><span>' + (ord.paymentType === 'card' ? 'CARD' : 'CASH') + '</span></div>');
  }
  div();
  /* Use a simpler flex-style layout for items so qty+amount are always on the same line */
  html.push('<div class="rflex" style="display:flex;justify-content:space-between;font-size:' + (is58 ? '12px' : '13px') + '"><span>QTY&nbsp;&nbsp;ITEM</span><span>AMT</span></div>');
  div();
  ord.items.forEach(function(item) {
    var extraAmt = parseFloat(item.extra) || 0;
    var amtStr = '\u00a3' + (item.price * item.qty + extraAmt).toFixed(2);
    var qtyStr = item.qty + 'x';
    /* Qty on left, then name, amount pinned to right */
    html.push('<div class="rflex" style="display:flex;justify-content:space-between;gap:4px;">' +
      '<span style="white-space:nowrap;padding-right:6px;">' + qtyStr + '</span>' +
      '<span style="overflow-wrap:break-word;word-break:normal;flex:1;">' + item.name + '</span>' +
      '<span style="white-space:nowrap;padding-left:6px;">' + amtStr + '</span>' +
      '</div>');
    if (extraAmt > 0) {
      row('  + Extra: \u00a3' + extraAmt.toFixed(2));
    }
    if (item.comment && item.comment.trim()) {
      item.comment.trim().split('\n').forEach(function(commentLine) {
        if (commentLine.trim()) rowb('  > ' + commentLine.trim());
      });
    }
    blank();
  });
  div();
  if (ord.deliveryCharge > 0 || ord.discountAmt > 0) {
    html.push('<div class="rflex" style="display:flex;justify-content:space-between;"><span>Subtotal</span><span>\u00a3' + (parseFloat(ord.foodTotal)||0).toFixed(2) + '</span></div>');
    if (ord.deliveryCharge > 0) html.push('<div class="rflex" style="display:flex;justify-content:space-between;"><span>Delivery</span><span>\u00a3' + ord.deliveryCharge.toFixed(2) + '</span></div>');
    if (ord.discountAmt > 0) html.push('<div class="rflex" style="display:flex;justify-content:space-between;"><span>Discount</span><span>-\u00a3' + ord.discountAmt.toFixed(2) + '</span></div>');
    div();
  }
  /* Recalculate total fresh — always correct regardless of stored value */
  var safeTotal = Math.max(0,
    (parseFloat(ord.foodTotal) || 0) +
    (parseFloat(ord.deliveryCharge) || 0) -
    (parseFloat(ord.discountAmt) || 0)
  );
  var totalAmt = '\u00a3' + safeTotal.toFixed(2);
  var totalFontSize = is58 ? '17px' : '19px';

/* ── DISCOUNT PCT INPUT ── uncontrolled-style to avoid Android clamp glitch */
function DiscountPctInput(props) {
  var discount = props.discount;
  var setDiscount = props.setDiscount;
  /* raw string while typing so partial input (e.g. "" or "2") isn't clamped mid-keystroke */
  var rawState = useState(String(discount.pct));
  var raw = rawState[0];
  var setRaw = rawState[1];

  /* Keep raw in sync if parent changes pct externally (e.g. Remove button resets to 10) */
  var prevPct = useRef(discount.pct);
  if (prevPct.current !== discount.pct) {
    prevPct.current = discount.pct;
    /* Only sync if raw doesn't already represent the same value */
    if (parseInt(raw, 10) !== discount.pct) setRaw(String(discount.pct));
  }

  return h('input', {
    type:'text',
    inputMode:'numeric',
    placeholder:'%',
    value: raw,
    onFocus: function(e){ e.target.select(); },
    onChange: function(e){
      var v = e.target.value.replace(/[^0-9]/g, '');
      setRaw(v);
      var n = parseInt(v, 10);
      if (!isNaN(n) && n >= 1 && n <= 99) {
        setDiscount(function(p){ return Object.assign({},p,{pct:n, type:'pct'}); });
      }
    },
    onBlur: function(){
      var n = parseInt(raw, 10);
      var clamped = isNaN(n) ? 10 : Math.min(99, Math.max(1, n));
      setRaw(String(clamped));
      setDiscount(function(p){ return Object.assign({},p,{pct:clamped, type:'pct'}); });
    },
    style:{width:52,background:C.bg,border:'1px solid ' + C.border,borderRadius:8,padding:'7px 8px',color:C.text,fontSize:13,outline:'none',textAlign:'center'}
  });
}

function HistoryView(props) {
  var orders = props.orders;
  var setOrders = props.setOrders;
  var clearOrders = props.clearOrders;
  var onPrint = props.onPrint;
  var menuItems = props.menuItems;

  var editingIdRef = useState(null);
  var editingId = editingIdRef[0];
  var setEditingId = editingIdRef[1];

  var draftRef = useState(null);
  var draft = draftRef[0];
  var setDraft = draftRef[1];

  var itemSearchRef = useState('');
  var itemSearch = itemSearchRef[0];
  var setItemSearch = itemSearchRef[1];

  function startEdit(ord) {
    setEditingId(ord.id);
    setDraft(JSON.parse(JSON.stringify(ord)));
    setItemSearch('');
  }
  function cancelEdit() { setEditingId(null); setDraft(null); }

  function saveEdit() {
    var foodTotal = draft.items.reduce(function(s,o){ return s + o.price * o.qty + (parseFloat(o.extra)||0); }, 0);
    var deliveryCharge = (draft.orderType === 'delivery' && draft.deliveryZone)
      ? parseCharge(draft.deliveryZone) : 0;
    var discountAmt = draft.discountAmt || 0;
    var total = Math.max(0, foodTotal + deliveryCharge - discountAmt);
    var updated = Object.assign({}, draft, {foodTotal:foodTotal, deliveryCharge:deliveryCharge, total:total});
    setOrders(function(prev){ return prev.map(function(o){ return o.id === updated.id ? updated : o; }); });
    setEditingId(null);
    setDraft(null);
  }

  function deleteOrder(id) {
    if (window.confirm('Delete this order from history?'))
      setOrders(function(prev){ return prev.filter(function(o){ return o.id !== id; }); });
  }

  function draftQty(idx, d) {
    var items = draft.items.slice();
    items[idx] = Object.assign({}, items[idx], {qty: Math.max(0, items[idx].qty + d)});
    setDraft(Object.assign({}, draft, {items: items.filter(function(i){ return i.qty > 0; })}));
  }
  function draftRemove(idx) {
    setDraft(Object.assign({}, draft, {items: draft.items.filter(function(_,i){ return i !== idx; })}));

  function draftAddItem(item) {
    var ex = draft.items.findIndex(function(i){ return i.id === item.id; });

/* ── BACKUP & RESTORE ── */
function BackupRestore(props) {
  var menuItems = props.menuItems;
  var zones = props.zones;
  var orders = props.orders;
  var setMenuItems = props.setMenuItems;
  var setZones = props.setZones;
  var setOrders = props.setOrders;
  var paperSize = props.paperSize;
  var setPaperSize = props.setPaperSize;
  var copies = props.copies;
  var setCopies = props.setCopies;

  var msgState = useState(null);
  var msg = msgState[0];
  var setMsg = msgState[1];

  var fileRef = useRef(null);

  function showMsg(text, ok) {
    setMsg({text: text, ok: ok !== false});
    setTimeout(function(){ setMsg(null); }, 3500);
  }

  function doExport() {
    var payload = {version:1, exported:new Date().toISOString(), menuItems:menuItems, zones:zones, orders:orders};
    var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'hongs_pos_backup_' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showMsg('Backup downloaded!', true);
  }

  function doImport(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.version || !Array.isArray(data.menuItems) || !Array.isArray(data.zones)) {
          showMsg('Invalid backup file', false); return;
        }
        var dateStr = data.exported ? new Date(data.exported).toLocaleString('en-GB') : 'unknown date';

        h('div', {style:{flex:1,overflow:'hidden',minWidth:0}}, h(MenuScreen, menuScreenProps)),
        h('div', {style:{width:340,borderLeft:'1px solid ' + C.border,flexShrink:0,display:'flex',flexDirection:'column',minHeight:0}}, h(BasketScreen, basketProps))
      ),
      (tab==='menuEdit'||tab==='zones'||tab==='history'||tab==='backup'||tab==='queue') && h('div', {style:{flex:1,overflowY:'auto',padding:20}},
        h('div', {style:{maxWidth:760,margin:'0 auto'}},
          tab==='queue'    && h(QueueView, queueProps),
          tab==='menuEdit' && h(MenuEditor, editorProps),
          tab==='zones'    && h(ZoneEditor, zoneProps),
          tab==='history'  && h(HistoryView, historyProps),
          tab==='backup'   && h(BackupRestore, backupProps)
        )
      ),
      printModal && h(PrintQueueModal, {
        jobs: printModal.jobs, idx: printModal.idx,
        onPrintThis: function(){ printReceipt(printModal.jobs[printModal.idx].ord, paperSize); },
        onNext: function(){
          var nextIdx = printModal.idx + 1;
          if (nextIdx >= printModal.jobs.length) {
            var done = printModal.onDone; setPrintModal(null); if (done) done();
          } else {
            setPrintModal(function(m){ return Object.assign({},m,{idx:nextIdx}); });
          }
        },
        onClose: function(){ if(printModal.onDone) printModal.onDone(); setPrintModal(null); }
      })
    );
  }

  /* ── MOBILE ── */
  var mobileTabs = [['menu','🛒','Order'],['basket','📝','Basket'+(itemCount>0?' ('+itemCount+')':'')],['queue','📋','Queue'],['histm','🕐','History'],['settings','⚙️','Editor'],['backupm','💾','Settings']];
  return h('div', {style:{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}},
    /* Tab bar at TOP */
    h('div', {style:{display:'flex',background:C.panel,borderBottom:'1px solid ' + C.border,flexShrink:0}},
      mobileTabs.map(function(t) {
        return h('button', {key:t[0], className:'mbtn', onClick:function(){ setTab(t[0]); }, style:{flex:1,padding:'8px 4px 10px',border:'none',cursor:'pointer',background:tab===t[0]?C.bg:'transparent',borderBottom:'2px solid ' + (tab===t[0]?C.accent:'transparent'),display:'flex',flexDirection:'column',alignItems:'center',gap:2}},
          h('div', {style:{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}},
            h('span', {style:{fontSize:18}}, t[1]),
            t[0]==='queue' && queue.length>0 && h('span', {style:{position:'absolute',top:-4,right:-10,background:'#c03030',color:'#fff',borderRadius:10,fontSize:10,fontWeight:900,padding:'0px 5px',lineHeight:'16px'}}, queue.length)
          ),
          h('span', {style:{fontSize:10,fontWeight:700,color:tab===t[0]?C.accent:C.muted,whiteSpace:'nowrap'}}, t[2])
        );
      })
    ),
    okBanner,
    h('div', {style:{flex:1,overflow:'hidden',minHeight:0,position:'relative'}},
      tab==='menu'    && h(MenuScreen, menuScreenProps),
      tab==='basket'  && h(BasketScreen, basketProps),
      (tab==='settings'||tab==='histm'||tab==='backupm'||tab==='queue') && h('div', {style:{position:'absolute',inset:0,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'16px 14px 30px'}},
        tab==='queue'    && h(QueueView, queueProps),
        tab==='settings' && h(React.Fragment, null,
          h(MenuEditor, editorProps),
          h('div', {style:{height:24}}),
          h(ZoneEditor, zoneProps)
        ),
        tab==='backupm' && h(BackupRestore, backupProps),
        tab==='histm'   && h(HistoryView, historyProps)
      )
    ),
    printModal && h(PrintQueueModal, {
      jobs: printModal.jobs, idx: printModal.idx,
      onPrintThis: function(){ printReceipt(printModal.jobs[printModal.idx].ord, paperSize); },
      onNext: function(){
        var nextIdx = printModal.idx + 1;
        if (nextIdx >= printModal.jobs.length) {
          var done = printModal.onDone; setPrintModal(null); if (done) done();
        } else {
          setPrintModal(function(m){ return Object.assign({},m,{idx:nextIdx}); });
        }
      },
      onClose: function(){ if(printModal.onDone) printModal.onDone(); setPrintModal(null); }
    })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
