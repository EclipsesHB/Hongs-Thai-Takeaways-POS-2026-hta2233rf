/* ── RECEIPT PRINTER ── */
function printReceipt(ord, paperSize, copies) {
  var is58 = paperSize === '58';
  var W = is58 ? 24 : 32;
  var mmSize = is58 ? '58mm' : '80mm';
  var mmWidth = is58 ? '50mm' : '72mm';
  var fontSize = is58 ? '11px' : '12px';
  var lineH = is58 ? '1.5' : '1.6';
  var padTop = is58 ? '3mm' : '4mm';
  var numCopies = parseInt(copies, 10) || 1;

  // Inject correct print CSS dynamically
  var styleEl = document.getElementById('receipt-print-style');
  if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = 'receipt-print-style'; document.head.appendChild(styleEl); }
  styleEl.textContent = '@media print{@page{size:' + mmSize + ' auto;margin:0;}#receipt-frame{display:block!important;font-family:"Courier New",Courier,monospace;font-size:' + fontSize + ';line-height:' + lineH + ';color:#000;background:#fff;width:' + mmWidth + ';padding:' + padTop + ' 0 15mm;margin:0 auto;white-space:pre-wrap;word-break:break-word;page-break-inside:avoid;-webkit-print-color-adjust:exact;}}';
  var HR = '<hr class="rhr"/>';
  function line(left, right) {
    var gap = W - left.length - right.length;
    return left + (gap > 0 ? ' '.repeat(gap) : ' ') + right;
  }
  var html = [];
  function row(txt) { html.push('<div>' + txt.replace(/ /g, '&nbsp;') + '</div>'); }
  function div() { html.push(HR); }
  function blank() { html.push('<div>&nbsp;</div>'); }

  function crow(txt) { html.push('<div style="text-align:center;">' + txt + '</div>'); }

  crow("HONG'S THAI TAKEAWAY");
  crow('01386 423341');
  crow('9 Four Pools Shopping Centre');
  crow('Davies Road, Evesham');
  crow('WR11 1YP');
  div();
  crow(ord.orderType === 'delivery' ? '*** DELIVERY ***' : '*** COLLECTION ***');
  div();
  row('Date : ' + ord.date);
  row('Time : ' + ord.time);
  row('Name : ' + (ord.customer.name || ''));
  blank();
  row('Tel  : ' + (ord.customer.phone || ''));
  blank();
  if (ord.orderType === 'delivery') {
    if (ord.customer.address) {
      var addrLines = ord.customer.address.split(/[\n,]+/).map(function(s){ return s.trim(); }).filter(Boolean);
      addrLines.forEach(function(part, i) {
        row((i === 0 ? 'Addr : ' : '       ') + part);
      });
    } else {
      row('Addr : ');
    }
    blank();
  }
  if (ord.customer.notes) {
    div();
    row('NOTE:');
    var words = ord.customer.notes.split(' ');
    var cur = '';
    words.forEach(function(w) {
      if ((cur + ' ' + w).trim().length <= W) { cur = (cur + ' ' + w).trim(); }
      else { row(cur); cur = w; }
    });
    if (cur) row(cur);
  }
  div();
  row('ITEM' + ' '.repeat(W - 4 - 2 - 5) + 'QT' + ' '.repeat(2) + 'AMT');
  div();
  ord.items.forEach(function(item) {
    var qtyStr = 'x' + item.qty;
    var amtStr = '\u00a3' + (item.price * item.qty).toFixed(2);
    var suffix = ' ' + qtyStr.padEnd(3) + amtStr.padStart(5);
    var maxNameW = W - suffix.length;
    var name = item.name;
    if (name.length <= maxNameW) {
      row(name.padEnd(maxNameW) + suffix);
    } else {
      var ws = name.split(' ');
      var lines = [];
      var c = '';
      ws.forEach(function(w) {
        if ((c + (c ? ' ' : '') + w).length <= maxNameW) { c = c + (c ? ' ' : '') + w; }
        else { if (c) lines.push(c); c = w; }
      });
      if (c) lines.push(c);
      lines.forEach(function(l, i) {
        if (i < lines.length - 1) row(l);
        else row(l.padEnd(maxNameW) + suffix);
      });
    }
  });
  div();
  if (ord.deliveryCharge > 0) {
    row(line('Food subtotal', '\u00a3' + ord.foodTotal.toFixed(2)));
    row(line('Delivery', '\u00a3' + ord.deliveryCharge.toFixed(2)));
    div();
  }
  if (ord.paymentType) {
    row(line('Payment', ord.paymentType === 'card' ? 'CARD' : 'CASH'));
    div();
  }
  var totalFontSize = is58 ? '12px' : '14px';
  html.push('<div style="font-size:' + totalFontSize + ';font-weight:bold;">' +
    line('TOTAL', '\u00a3' + ord.total.toFixed(2)).replace(/ /g, '&nbsp;') + '</div>');
  div();
  blank();
  html.push('<div style="text-align:center;">Thank you for your order!</div>');
  html.push('<div style="text-align:center;">hongsthaitakeaway.co.uk</div>');
  blank();
  blank();
  document.getElementById('receipt-frame').innerHTML = html.join('');
  // Print numCopies times with a short delay between each
  function doPrint(i) {
    if (i >= numCopies) return;
    window.print();
    if (i < numCopies - 1) setTimeout(function(){ doPrint(i + 1); }, 800);
  }
  doPrint(0);
}

/* ── GROUP MENU ITEMS BY VARIANT GROUP ── */
function parseCharge(str) {
  if (!str) return 0;
  return parseFloat(String(str).replace('£','').replace('\u00a3','')) || 0;
}
function buildGroups(items) {
  var result = [];
  var seen = {};
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var g = item.grp || null;
    var key = g ? g : 'solo_' + item.id;
    if (!seen[key]) {
      seen[key] = true;
      var grpItems = g ? items.filter(function(x){ return x.grp === g; }) : [item];
      result.push({grp: g, items: grpItems});
    }
  }
  return result;
}

/* ── MENU SCREEN ── */
function MenuScreen(props) {
  var menuItems = props.menuItems;
  var order = props.order;
  var onAdd = props.onAdd;
  var onRemove = props.onRemove;
  var search = props.search;
  var setSearch = props.setSearch;
  var activeCat = props.activeCat;
  var setActiveCat = props.setActiveCat;
  var catRefs = props.catRefs;
  var isDesktop = props.isDesktop;

  var filtered = useMemo(function() {
    if (!search.trim()) return menuItems;
    var q = search.toLowerCase();
    return menuItems.filter(function(i){ return i.name.toLowerCase().indexOf(q) !== -1; });
  }, [menuItems, search]);

  function getCatItems(cat) {
    return filtered.filter(function(i){ return i.cat === cat; });
  }

  var catsToShow = search.trim()
    ? CATS.filter(function(c){ return getCatItems(c).length > 0; })
    : (activeCat === 'All' ? CATS : [activeCat]);

  function scrollTo(cat) {
    setActiveCat(cat);
    setSearch('');
    setTimeout(function() {
      var el = catRefs.current[cat];
      var sc = document.getElementById('mscroll');
      if (el && sc) sc.scrollTop = el.offsetTop - 2;
    }, 40);
  }

  var pillRow = h('div', {
    style:{display:'flex',gap:6,padding:'0 12px 8px',overflowX:'auto',WebkitOverflowScrolling:'touch'}
  }, ['All'].concat(CATS).map(function(cat) {
    var active = cat === 'All' ? activeCat === 'All' : cat === activeCat;
    return h('button', {
      key: cat,
      className: 'mbtn',
      onClick: function() {
        if (cat === 'All') { setActiveCat('All'); document.getElementById('mscroll').scrollTop = 0; }
        else scrollTo(cat);
      },
      style:{
        padding:'8px 14px', borderRadius:8,
        border:'1px solid ' + (active ? C.accent : C.border),
        background: active ? C.accent : 'transparent',
        color: active ? C.bg : C.muted,
        fontSize:13, fontWeight:700, cursor:'pointer', whiteSpace:'nowrap', flexShrink:0
      }
    }, cat === 'All' ? 'All' : ICONS[cat] + ' ' + cat);
  }));

  var catNodes = catsToShow.map(function(cat) {
    var catItems = getCatItems(cat);
    if (!catItems.length) return null;
    var groups = buildGroups(catItems);
    var soloCols = isDesktop ? 4 : 2;
    var soloItems = groups.filter(function(s){ return !s.grp; }).map(function(s){ return s.items[0]; });
    var grpSections = groups.filter(function(s){ return s.grp; });

    var soloGrid = soloItems.length > 0 ? h('div', {style:{display:'grid', gridTemplateColumns:'repeat(' + soloCols + ',1fr)', gap:6, marginBottom: grpSections.length > 0 ? 10 : 0}},
      soloItems.map(function(item) {
        var inOrder = order.find(function(o){ return o.id === item.id; });
        return h('div', {key: item.id, style:{position:'relative'}},
          h('button', {
            className:'mbtn',
            onClick: function(){ onAdd(item); },
            style:{width:'100%', background:inOrder?C.selected:C.card, border:'2px solid '+(inOrder?C.accent:C.border), borderRadius:10, padding:'10px 8px', cursor:'pointer', textAlign:'left', color:C.text, boxShadow:inOrder?'0 0 0 1px '+C.accent+'40':'none', display:'block'}
          },
            h('div', {style:{fontSize:13,fontWeight:800,color:C.muted,marginBottom:2}}, '#' + item.num),
            h('div', {style:{fontWeight:700,fontSize:13,lineHeight:1.3,marginBottom:5}}, item.name),
            h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
              h('span', {style:{color:C.accent,fontWeight:800,fontSize:13}}, '\u00a3' + item.price.toFixed(2)),
              inOrder && h('span', {style:{background:C.accent,color:C.bg,fontWeight:800,fontSize:11,padding:'2px 6px',borderRadius:7}}, '\u00d7' + inOrder.qty)
            )
          ),
          inOrder && h('button', {
            className:'mbtn',
            onClick: function(e){ e.stopPropagation(); onRemove(item.id); },
            style:{position:'absolute',top:4,right:4,width:22,height:22,borderRadius:6,border:'none',background:C.danger,color:'#fff',cursor:'pointer',fontSize:14,fontWeight:900,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center',padding:0}
          }, '−')
        );
      })
    ) : null;

    var grpGrids = grpSections.map(function(sec, si) {
      var grpCols = Math.min(sec.items.length, isDesktop ? 4 : 2);
      return h('div', {key: si, style:{marginBottom:10}},

/* ── HISTORY VIEW ── */
function HistoryView(props) {
  var orders = props.orders;
  var setOrders = props.setOrders;
  var clearOrders = props.clearOrders;
  var onPrint = props.onPrint;
  var menuItems = props.menuItems;

  var editingIdRef = useState(null);
  var editingId = editingIdRef[0];
  var setEditingId = editingIdRef[1];

  var draftRef = useState(null);
  var draft = draftRef[0];
  var setDraft = draftRef[1];

  var itemSearchRef = useState('');
  var itemSearch = itemSearchRef[0];
  var setItemSearch = itemSearchRef[1];

  function startEdit(ord) {
    setEditingId(ord.id);
    setDraft(JSON.parse(JSON.stringify(ord)));
    setItemSearch('');
  }
  function cancelEdit() { setEditingId(null); setDraft(null); }

  function saveEdit() {
    var foodTotal = draft.items.reduce(function(s,o){ return s + o.price * o.qty; }, 0);
    var deliveryCharge = (draft.orderType === 'delivery' && draft.deliveryZone)
      ? parseCharge(draft.deliveryZone) : 0;
    var updated = Object.assign({}, draft, {foodTotal:foodTotal, deliveryCharge:deliveryCharge, total:foodTotal+deliveryCharge});
    setOrders(function(prev){ return prev.map(function(o){ return o.id === updated.id ? updated : o; }); });
    setEditingId(null);
    setDraft(null);
  }

  function deleteOrder(id) {
    if (window.confirm('Delete this order from history?'))
      setOrders(function(prev){ return prev.filter(function(o){ return o.id !== id; }); });
  }

  function draftQty(idx, d) {
    var items = draft.items.slice();
    items[idx] = Object.assign({}, items[idx], {qty: Math.max(0, items[idx].qty + d)});
    setDraft(Object.assign({}, draft, {items: items.filter(function(i){ return i.qty > 0; })}));
  }
  function draftRemove(idx) {

/* ── BACKUP & RESTORE ── */
function BackupRestore(props) {
  var menuItems = props.menuItems;
  var zones = props.zones;
  var orders = props.orders;
  var setMenuItems = props.setMenuItems;
  var setZones = props.setZones;
  var setOrders = props.setOrders;
  var paperSize = props.paperSize;
  var setPaperSize = props.setPaperSize;
  var copies = props.copies;
  var setCopies = props.setCopies;

  var msgState = useState(null);
  var msg = msgState[0];
  var setMsg = msgState[1];

  var fileRef = useRef(null);

  function showMsg(text, ok) {
    setMsg({text: text, ok: ok !== false});
    setTimeout(function(){ setMsg(null); }, 3500);
  }

  function doExport() {
    var payload = {version:1, exported:new Date().toISOString(), menuItems:menuItems, zones:zones, orders:orders};
    var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'hongs_pos_backup_' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showMsg('Backup downloaded!', true);
  }

  function doImport(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.version || !Array.isArray(data.menuItems) || !Array.isArray(data.zones)) {
          showMsg('Invalid backup file', false); return;
        }
        var dateStr = data.exported ? new Date(data.exported).toLocaleString('en-GB') : 'unknown date';
        if (!window.confirm('Import backup from ' + dateStr + '?\n\nThis will REPLACE your current menu, zones and order history.')) return;
        setMenuItems(data.menuItems);
        setZones(data.zones);
        if (Array.isArray(data.orders)) setOrders(data.orders);
        showMsg('Backup restored!', true);
      } catch(err) {
        showMsg('Could not read file', false);
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  }

  var card = {background:C.card, borderRadius:12, padding:16, border:'1px solid ' + C.border, marginBottom:14};

  return h('div', {style:{padding:4}},
    h('div', {style:{display:'flex',alignItems:'center',gap:10,marginBottom:8}},
      h('span', {style:{fontSize:22}}, '💾'),
      h('h2', {style:{color:C.accent,margin:0,fontSize:18}}, 'Settings & Backup')
    ),
    h('p', {style:{fontSize:13,color:C.muted,marginBottom:16}}, 'Save your menu, zones and order history to a file, or restore from a previous backup.'),

    /* Paper size toggle */
    h('div', {style:{background:C.card,borderRadius:12,padding:16,border:'1px solid ' + C.border,marginBottom:14}},
      h('div', {style:{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1.5,marginBottom:10}}, '🖨️ RECEIPT PAPER SIZE'),
      h('div', {style:{display:'flex',gap:8}},
        ['58','80'].map(function(size) {
          var active = paperSize === size;
          return h('button', {
            key: size, className:'mbtn',
            onClick: function(){ setPaperSize(size); },
            style:{
              flex:1, padding:'10px 8px', borderRadius:9,
              border:'1px solid ' + (active ? C.accent : C.border),
              background: active ? C.accentBg : 'transparent',
              color: active ? C.accent : C.muted,
              fontWeight:700, fontSize:13, cursor:'pointer'
            }
          }, size + 'mm');
        })
      ),
      h('div', {style:{fontSize:12,color:C.muted,marginTop:8}},
        paperSize === '58' ? 'Fits 58mm thermal paper — most Android POS terminals' : 'Fits 80mm thermal paper — standard desktop receipt printers'
      )
    ),
    /* Copies selector */
    h('div', {style:{background:C.card,borderRadius:12,padding:16,border:'1px solid ' + C.border,marginBottom:14}},
      h('div', {style:{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1.5,marginBottom:10}}, '🖨️ RECEIPT COPIES'),
      h('div', {style:{display:'flex',gap:8}},
        ['1','2','3'].map(function(n) {
          var active = copies === n;
          return h('button', {
            key: n, className:'mbtn',
            onClick: function(){ setCopies(n); },
            style:{
              flex:1, padding:'10px 8px', borderRadius:9,
              border:'1px solid ' + (active ? C.accent : C.border),
              background: active ? C.accentBg : 'transparent',
              color: active ? C.accent : C.muted,
              fontWeight:700, fontSize:13, cursor:'pointer'
            }
          }, n + (n === '1' ? ' copy' : ' copies'));
        })
      ),
      h('div', {style:{fontSize:12,color:C.muted,marginTop:8}},
        'Prints ' + copies + (copies === '1' ? ' receipt' : ' receipts') + ' automatically on every order'
      )
    ),
    h('div', {style:card},
      h('div', {style:{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1.5,marginBottom:10}}, '\u2b07\ufe0f EXPORT BACKUP'),
      h('button', {className:'mbtn', onClick:doExport, style:{width:'100%',padding:'11px 18px',borderRadius:9,border:'none',fontWeight:700,fontSize:13,cursor:'pointer',background:C.accent,color:C.bg}}, 'Download Backup File'),
      h('div', {style:{fontSize:12,color:C.muted,marginTop:8}},
        'Includes: ' + menuItems.length + ' menu items \u00b7 ' + zones.length + ' delivery zones \u00b7 ' + orders.length + ' orders'
      )
    ),
    h('div', {style:card},
      h('div', {style:{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1.5,marginBottom:10}}, '\u2b06\ufe0f RESTORE FROM BACKUP'),
      h('button', {className:'mbtn', onClick:function(){ fileRef.current.click(); }, style:{width:'100%',padding:'11px 18px',borderRadius:9,fontWeight:700,fontSize:13,cursor:'pointer',background:'transparent',border:'1px solid ' + C.border,color:C.text}}, 'Choose Backup File (.json)'),
      h('input', {ref:fileRef, type:'file', accept:'.json,application/json', style:{display:'none'}, onChange:doImport}),
      h('div', {style:{fontSize:12,color:C.muted,marginTop:8}}, 'Only .json files exported from this app are supported.')
    ),
    msg && h('div', {style:{padding:'12px 16px',borderRadius:10,fontWeight:700,fontSize:14,background:msg.ok?'#1e3a28':'#3a1e1e',color:msg.ok?'#70e890':'#e87070',border:'1px solid ' + (msg.ok?'#2a6a3a':'#6a2a2a')}},
      (msg.ok ? '✅' : '❌') + ' ' + msg.text
    )
  );
}

  });
  var menuItems = menuItemsState[0]; var setMenuItems = menuItemsState[1];

  var zonesState = useState(function() {
    try { var s = JSON.parse(localStorage.getItem('hongs_z') || 'null'); return s && s.length ? s : DEF_ZONES; } catch(e) { return DEF_ZONES; }
  });
  var zones = zonesState[0]; var setZones = zonesState[1];

  var ordersState = useState(function() {
    try { return JSON.parse(localStorage.getItem('hongs_o') || '[]'); } catch(e) { return []; }
  });
  var orders = ordersState[0]; var setOrders = ordersState[1];

  var orderState = useState([]); var order = orderState[0]; var setOrder = orderState[1];
  var customerState = useState({name:'',phone:'',address:'',notes:''}); var customer = customerState[0]; var setCustomer = customerState[1];
  var orderTypeState = useState('delivery'); var orderType = orderTypeState[0]; var setOrderType = orderTypeState[1];
  var paymentTypeState = useState('cash'); var paymentType = paymentTypeState[0]; var setPaymentType = paymentTypeState[1];
  var selZoneState = useState(null); var selZone = selZoneState[0]; var setSelZone = selZoneState[1]; /* null or price string e.g. "2.50" */
  var isDesktopState = useState(function(){ return window.innerWidth >= 800; }); var isDesktop = isDesktopState[0]; var setIsDesktop = isDesktopState[1];
  var tabState = useState(function(){ return window.innerWidth >= 800 ? 'order' : 'menu'; }); var tab = tabState[0]; var setTab = tabState[1];
  var activeCatState = useState('All'); var activeCat = activeCatState[0]; var setActiveCat = activeCatState[1];
  var searchState = useState(''); var search = searchState[0]; var setSearch = searchState[1];
  var showOkState = useState(false); var showOk = showOkState[0]; var setShowOk = showOkState[1];
  var newItemState = useState({name:'',price:'',cat:'Starters'}); var newItem = newItemState[0]; var setNewItem = newItemState[1];
  var editItemState = useState(null); var editItem = editItemState[0]; var setEditItem = editItemState[1];
  var newZoneState = useState({area:'',price:''}); var newZone = newZoneState[0]; var setNewZone = newZoneState[1];
  var editZoneState = useState(null); var editZone = editZoneState[0]; var setEditZone = editZoneState[1];
  var paperSizeState = useState(function(){ return localStorage.getItem('hongs_paper') || '58'; }); var paperSize = paperSizeState[0]; var setPaperSize = paperSizeState[1];
  var copiesState = useState(function(){ return localStorage.getItem('hongs_copies') || '1'; }); var copies = copiesState[0]; var setCopies = copiesState[1];
  var catRefs = useRef({});

  useEffect(function(){ localStorage.setItem('hongs_m3', JSON.stringify(menuItems)); }, [menuItems]);
  useEffect(function(){ localStorage.setItem('hongs_z', JSON.stringify(zones)); }, [zones]);
  useEffect(function(){ localStorage.setItem('hongs_o', JSON.stringify(orders)); }, [orders]);
  useEffect(function(){ localStorage.setItem('hongs_paper', paperSize); }, [paperSize]);
  useEffect(function(){ localStorage.setItem('hongs_copies', copies); }, [copies]);
  useEffect(function(){ if (orderType !== 'delivery') setSelZone(null); }, [orderType]);
  useEffect(function() {
    function fn() { setIsDesktop(window.innerWidth >= 800); }
    window.addEventListener('resize', fn);
    return function(){ window.removeEventListener('resize', fn); };
  }, []);

  function addToOrder(item) {
    setOrder(function(prev) {
      var ex = prev.find(function(o){ return o.id === item.id; });
      if (ex) return prev.map(function(o){ return o.id === item.id ? Object.assign({},o,{qty:o.qty+1}) : o; });
      return prev.concat([Object.assign({},item,{qty:1})]);
    });
  }
  function updateQty(id, d) {
    setOrder(function(prev){
      return prev.map(function(o){ return o.id===id ? Object.assign({},o,{qty:Math.max(0,o.qty+d)}) : o; }).filter(function(o){ return o.qty>0; });
    });
  }

  var foodTotal = order.reduce(function(s,o){ return s + o.price * o.qty; }, 0);
  var delCharge = orderType === 'delivery' && selZone ? parseFloat(selZone) || 0 : 0;
  var grand = foodTotal + delCharge;
  var itemCount = order.reduce(function(s,o){ return s + o.qty; }, 0);

  function submit() {
    if (!order.length) return;
    var newOrd = {
      id: Date.now(),
      customer: Object.assign({}, customer),
      items: order.slice(),
      foodTotal: foodTotal,
      deliveryCharge: delCharge,
      deliveryZone: selZone ? '\u00a3' + parseFloat(selZone).toFixed(2) : null,
      total: grand,
      orderType: orderType,
      paymentType: paymentType,
      time: new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}),
      date: new Date().toLocaleDateString('en-GB')
    };
    setOrders(function(prev){ return [newOrd].concat(prev); });
    setOrder([]);
    setCustomer({name:'',phone:'',address:'',notes:''});
    setSelZone(null);
    setPaymentType('cash');
    setTab(isDesktop ? 'order' : 'menu');
    setShowOk(true);
    setTimeout(function(){ setShowOk(false); }, 3000);
    setTimeout(function(){ printReceipt(newOrd, paperSize, copies); }, 150);
  }

  function addItem() {
    if (!newItem.name.trim() || !newItem.price) return;
    setMenuItems(function(p){ return p.concat([Object.assign({},newItem,{id:Date.now(),num:'—',price:parseFloat(newItem.price)})]); });
    setNewItem({name:'',price:'',cat:newItem.cat});
  }
  function delItem(id) { if (window.confirm('Delete item?')) setMenuItems(function(p){ return p.filter(function(i){ return i.id!==id; }); }); }
  function saveItem() { setMenuItems(function(p){ return p.map(function(i){ return i.id===editItem.id ? Object.assign({},editItem,{price:parseFloat(editItem.price)}) : i; }); }); setEditItem(null); }
  function resetMenu() { if (window.confirm('Reset menu to default? This will remove any custom items you have added.')) { setMenuItems(MENU); setEditItem(null); } }
  function addZone() { if (!newZone.area.trim() || !newZone.price) return; setZones(function(p){ return p.concat([Object.assign({},newZone,{id:Date.now(),price:parseFloat(newZone.price)})]); }); setNewZone({area:'',price:''}); }
  function delZone(id) { if (window.confirm('Remove zone?')) setZones(function(p){ return p.filter(function(z){ return z.id!==id; }); }); }
  function saveZone() { setZones(function(p){ return p.map(function(z){ return z.id===editZone.id ? Object.assign({},editZone,{price:parseFloat(editZone.price)}) : z; }); }); setEditZone(null); }

  var smInp = {background:C.bg, border:'1px solid ' + C.border, borderRadius:8, padding:'10px 12px', color:C.text, fontSize:14, outline:'none'};

  var header = h('div', {style:{background:C.panel,padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',borderTop:'1px solid ' + C.border,flexShrink:0}},
    h('div', {style:{display:'flex',alignItems:'center',gap:10}},
      h('span', {style:{fontSize:22}}, '🍜'),
      h('div', null,
        h('div', {style:{fontWeight:800,fontSize:16,color:C.text}}, "Hong's Thai Takeaway"),
        h('div', {style:{fontSize:10,color:C.muted,letterSpacing:1.5}}, 'POS \u00b7 EVESHAM')
      )
    ),
    h('div', {style:{textAlign:'right'}},
      h('div', {style:{fontSize:12,color:C.dim}}, new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})),
      h('div', {style:{fontSize:10,color:C.muted}}, 'Delivery min \u00a315')
    )
  );

  var okBanner = showOk && h('div', {style:{background:'#1e3a28',color:'#70e890',textAlign:'center',padding:9,fontWeight:700,fontSize:13,flexShrink:0}}, '✅ Order placed!');

  var backupProps = {menuItems:menuItems,zones:zones,orders:orders,setMenuItems:setMenuItems,setZones:setZones,setOrders:setOrders,paperSize:paperSize,setPaperSize:setPaperSize,copies:copies,setCopies:setCopies};
  var editorProps = {menuItems:menuItems,newItem:newItem,setNewItem:setNewItem,editItem:editItem,setEditItem:setEditItem,addItem:addItem,delItem:delItem,saveItem:saveItem,smInp:smInp,resetMenu:resetMenu};
  var zoneProps = {zones:zones,newZone:newZone,setNewZone:setNewZone,editZone:editZone,setEditZone:setEditZone,addZone:addZone,delZone:delZone,saveZone:saveZone,smInp:smInp,defZones:DEF_ZONES,setZones:setZones};
  var historyProps = {orders:orders,setOrders:setOrders,clearOrders:function(){ if(window.confirm('Clear history?')) setOrders([]); },onPrint:function(ord){ printReceipt(ord, paperSize, copies); },menuItems:menuItems};
  var menuScreenProps = {menuItems:menuItems,order:order,onAdd:addToOrder,onRemove:function(id){ updateQty(id,-1); },search:search,setSearch:setSearch,activeCat:activeCat,setActiveCat:setActiveCat,catRefs:catRefs,isDesktop:isDesktop};
  var basketProps = {order:order,updateQty:updateQty,customer:customer,setCustomer:setCustomer,orderType:orderType,setOrderType:setOrderType,selectedZone:selZone,setSelectedZone:setSelZone,foodTotal:foodTotal,deliveryCharge:delCharge,grandTotal:grand,onSubmit:submit,paymentType:paymentType,setPaymentType:setPaymentType};

  /* ── DESKTOP ── */
  if (isDesktop) {
    var desktopTabs = [['order','🛒 New Order'],['menuEdit','🍽️ Menu Editor'],['zones','🚗 Delivery Zones'],['history','📋 History'],['backup','⚙️ Settings & Backup']];
    return h('div', {style:{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}},
      header,
      h('div', {style:{display:'flex',background:C.panel,borderBottom:'1px solid ' + C.border,flexShrink:0,overflowX:'auto'}},
        desktopTabs.map(function(t) {
          return h('button', {key:t[0], className:'mbtn', onClick:function(){ setTab(t[0]); }, style:{padding:'13px 22px',border:'none',cursor:'pointer',fontSize:13,fontWeight:700,whiteSpace:'nowrap',background:tab===t[0]?C.bg:'transparent',color:tab===t[0]?C.accent:C.muted,borderBottom:tab===t[0]?'2px solid ' + C.accent:'2px solid transparent',flexShrink:0}},
            t[1] + (t[0]==='order' && itemCount>0 ? ' (' + itemCount + ')' : '')
          );
        })
      ),
      okBanner,
      tab === 'order' && h('div', {style:{flex:1,display:'flex',overflow:'hidden',minHeight:0}},
        h('div', {style:{flex:1,overflow:'hidden',minWidth:0}}, h(MenuScreen, menuScreenProps)),
        h('div', {style:{width:340,borderLeft:'1px solid ' + C.border,flexShrink:0,display:'flex',flexDirection:'column',minHeight:0}}, h(BasketScreen, basketProps))
      ),
      (tab==='menuEdit'||tab==='zones'||tab==='history'||tab==='backup') && h('div', {style:{flex:1,overflowY:'auto',padding:20}},
        h('div', {style:{maxWidth:760,margin:'0 auto'}},
          tab==='menuEdit' && h(MenuEditor, editorProps),
          tab==='zones'    && h(ZoneEditor, zoneProps),
          tab==='history'  && h(HistoryView, historyProps),
          tab==='backup'   && h(BackupRestore, backupProps)
        )
      )
    );
  }

  /* ── MOBILE ── */
  var mobileTabs = [['menu','🍜','Menu'],['basket','🛒','Basket'+(itemCount>0?' ('+itemCount+')':'')],['settings','⚙️','Editor'],['backupm','💾','Settings'],['histm','📋','History']];
  return h('div', {style:{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}},
    /* Tab bar at TOP */
    h('div', {style:{display:'flex',background:C.panel,borderBottom:'1px solid ' + C.border,flexShrink:0}},
      mobileTabs.map(function(t) {
        return h('button', {key:t[0], className:'mbtn', onClick:function(){ setTab(t[0]); }, style:{flex:1,padding:'8px 4px 10px',border:'none',cursor:'pointer',background:tab===t[0]?C.bg:'transparent',borderBottom:'2px solid ' + (tab===t[0]?C.accent:'transparent'),display:'flex',flexDirection:'column',alignItems:'center',gap:2}},
          h('span', {style:{fontSize:18}}, t[1]),
          h('span', {style:{fontSize:10,fontWeight:700,color:tab===t[0]?C.accent:C.muted,whiteSpace:'nowrap'}}, t[2])
        );
      })
    ),
    okBanner,
    h('div', {style:{flex:1,overflow:'hidden',minHeight:0,position:'relative'}},
      tab==='menu'    && h(MenuScreen, menuScreenProps),
      tab==='basket'  && h(BasketScreen, basketProps),
      (tab==='settings'||tab==='histm'||tab==='backupm') && h('div', {style:{position:'absolute',inset:0,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'16px 14px 30px'}},
        tab==='settings' && h(React.Fragment, null,
          h(MenuEditor, editorProps),
          h('div', {style:{height:24}}),
          h(ZoneEditor, zoneProps)
        ),
        tab==='backupm' && h(BackupRestore, backupProps),
        tab==='histm'   && h(HistoryView, historyProps)
      )
    ),
    /* Branding at BOTTOM */
    header
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
